# Reusable workflow: SAST via CodeQL code scanning.
#
# CodeQL builds a database (AST + data-flow + control-flow graphs) and runs
# security queries, emitting SARIF 2.1.0 into the GitHub code-scanning hub. On
# a pull request the "Code scanning results" check fails on any error/critical/
# high finding — wire it as a required status check to make it a merge gate.
# Free for public repositories by default (GitHub Advanced Security).
#
# Compiled languages (c-cpp, csharp, go, java-kotlin, swift) generally need a
# build: pass `build-mode: autobuild` or `build-mode: manual` and call once per
# language. Interpreted languages (javascript-typescript, python, ruby,
# actions) work with `build-mode: none`.
#
# Usage:
#   jobs:
#     sast:
#       permissions:
#         security-events: write
#         contents: read
#         actions: read
#       uses: zircote/.github/.github/workflows/reusable-sast-codeql.yml@<sha>
#       with:
#         languages: 'javascript-typescript,python'

name: sast-codeql

on:
  workflow_call:
    inputs:
      languages:
        description: 'Comma-separated CodeQL languages (e.g. javascript-typescript,python)'
        required: true
        type: string
      build-mode:
        description: 'CodeQL build mode: none | autobuild | manual'
        required: false
        type: string
        default: 'none'
      config-file:
        description: 'Optional path to a codeql-config.yml'
        required: false
        type: string
        default: ''
      queries:
        description: 'Optional query suite (e.g. security-extended)'
        required: false
        type: string
        default: ''
    outputs:
      sarif-artifact:
        description: 'Artifact name holding the SARIF evidence (attestation seam)'
        value: sast-sarif
      sarif-filename:
        description: 'SARIF filename within the artifact'
        value: results.sarif

permissions:
  contents: read

jobs:
  analyze:
    name: analyze
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # upload SARIF to code scanning
      contents: read
      actions: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: ${{ inputs.languages }}
          build-mode: ${{ inputs.build-mode }}
          config-file: ${{ inputs.config-file }}
          queries: ${{ inputs.queries }}

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@38697555549f1db7851b81482ff19f1fa5c4fedc # v4.34.1
        with:
          category: '/language:${{ inputs.languages }}'
          # Write SARIF to a directory in addition to the code-scanning upload,
          # so the attestation seam can sign it bound to a release subject.
          output: codeql-sarif

      # CodeQL writes one SARIF per language; merge their runs into a single
      # results.sarif and expose it as a downloadable artifact for the seam.
      - name: Merge SARIF for attestation
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(codeql-sarif/*.sarif)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "::error::CodeQL produced no SARIF"; exit 1
          fi
          jq -s '{
            "$schema": .[0]."$schema",
            "version": .[0].version,
            "runs": (map(.runs) | add)
          }' "${files[@]}" > results.sarif
          jq -e . results.sarif > /dev/null

      - name: Upload SAST SARIF artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sast-sarif
          path: results.sarif
          if-no-files-found: error
