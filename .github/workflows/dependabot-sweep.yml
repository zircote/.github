# Dependabot PR Sweep
# Runs daily to catch Dependabot PRs that slipped through per-repo automerge.
# Approves and squash-merges PRs with passing CI, skips pending, logs failures.
#
# Can also be triggered manually via workflow_dispatch.
# Security: No user-controlled inputs are interpolated in this workflow.

name: Dependabot Sweep

on:
  schedule:
    - cron: "0 10 * * *" # Daily at 10:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Sweep Dependabot PRs
        env:
          GH_TOKEN: ${{ secrets.ROLLOUT_PAT }}
        run: bash scripts/dependabot-sweep.sh
